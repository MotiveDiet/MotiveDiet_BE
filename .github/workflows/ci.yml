# 결정적으로 검사할 수 있는 것은 컨텍스트가 아니라 여기서 강제한다.
#
# Stop 훅의 quality-gate.py 와 검사 항목이 겹치지만 역할이 다르다:
#   - 게이트 : 에이전트가 턴을 끝내기 전. 빠른 피드백. 에이전트가 우회할 수 있다
#   - CI     : 푸시 후. 느리지만 에이전트와 독립적이다. 우회 불가
# 에이전트를 신뢰하지 않는 층이 하나는 있어야 한다.
#
# Railway 빌드는 `-x test` 로 테스트를 건너뛴다. 테스트를 실제로 돌리는 곳은 여기뿐이다.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          # .java-version 과 어긋나면 Railway 빌드와 다른 걸 검증하게 된다
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: 컴파일
        run: ./gradlew compileJava compileTestJava

      - name: 테스트
        # DB_URL 이 없으면 build.gradle 이 contextLoads() 를 제외한다 (그 테스트가 실제 MySQL 을 요구).
        # 나머지는 전부 돌리므로 새로 추가되는 테스트도 자동으로 포함된다.
        run: ./gradlew test

      - name: 테스트가 실제로 실행됐는지 확인
        # BUILD SUCCESSFUL 은 근거가 안 된다 — 스킵돼도 초록불이다
        run: |
          python3 - <<'PY'
          import glob, sys, xml.etree.ElementTree as ET
          files = glob.glob("build/test-results/test/*.xml")
          if not files:
              sys.exit("실행된 테스트가 없다")
          total = failed = skipped = 0
          for f in files:
              r = ET.parse(f).getroot()
              total += int(r.get("tests", 0))
              failed += int(r.get("failures", 0)) + int(r.get("errors", 0))
              skipped += int(r.get("skipped", 0))
          # 스킵을 빼야 한다. @Disabled 를 전부 붙이면 tests 는 늘어나지만 실행은 0건이다
          executed = total - skipped
          print(f"수집 {total}건, 실행 {executed}건, 실패 {failed}건, 스킵 {skipped}건")
          if executed <= 0:
              sys.exit("실행된 테스트가 0건이다 (전부 스킵)")
          if failed:
              sys.exit(f"테스트 실패 {failed}건")
          PY

  mcp-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: MCP 정본 ↔ .mcp.json 동기화 확인
        # 정본(.agents/mcp/servers.json)만 고치고 sync 를 안 하면 .mcp.json 이 어긋난다.
        # sync-mcp.sh 는 ~/.codex/config.toml 도 검사하지만 CI 엔 없어 .mcp.json 만 대상이 된다.
        run: .agents/scripts/sync-mcp.sh --check

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 비밀값 스캔
        # 에이전트가 게이트를 우회해도 여기서 잡힌다.
        # 실제로 settings.local.json 에 로컬 DB 비밀번호가 들어가 있던 전례가 있다.
        run: python3 .agents/scripts/scan-secrets.py --tracked

  # 2중 검증 루프 3단계(Codex 교차 검증)를 강제한다.
  # Stop 훅의 게이트는 에이전트가 우회할 수 있지만 이 잡은 못 한다.
  # 코드가 바뀌었는데 그 코드를 검증한 Codex 리뷰 기록이 없으면 실패한다.
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: base 결정
        id: base
        run: |
          # PR 이면 base 브랜치, push 면 직전 커밋과 비교해 코드 변경 여부를 판단한다.
          # 최초 푸시(before 가 0000...)면 비교 대상이 없으니 검증을 요구한다.
          if [ -n "${{ github.base_ref }}" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && \
               [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=" >> "$GITHUB_OUTPUT"
          fi

      - name: 교차 검증 기록 확인
        run: |
          if [ -n "${{ steps.base.outputs.ref }}" ]; then
            python3 .agents/scripts/check-review.py --verify --base "${{ steps.base.outputs.ref }}"
          else
            python3 .agents/scripts/check-review.py --verify
          fi

      - name: 스키마 변경에 DDL 이 동반됐는지
        # 로컬 게이트에만 있으면 우회 가능하다. 순서를 어기면 프로덕션이 기동조차 못 하므로
        # CI 에도 둔다 (2026-07-16 Codex 리뷰 지적).
        run: |
          BASE="${{ steps.base.outputs.ref }}"
          [ -z "$BASE" ] && exit 0
          CHANGED="$(git diff --name-only "$BASE" -- 'src/main/java/**/domain/*.java')"
          [ -z "$CHANGED" ] && exit 0
          if git diff --name-only "$BASE" -- schema-changes.sql | grep -q .; then
            echo "엔티티 변경 + DDL 동반 확인"
            exit 0
          fi
          echo "엔티티를 바꿨는데 schema-changes.sql 이 없다:" >&2
          echo "$CHANGED" >&2
          echo "prod 는 ddl-auto: validate 다. 컬럼이 DB 에 없으면 머지 즉시 앱이 기동하지 못한다." >&2
          exit 1

